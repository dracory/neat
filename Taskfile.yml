version: '3'

tasks:
  test:
    desc: Run all tests
    cmds:
      - go test ./... -v -count=1

  test-short:
    desc: Run short tests only
    cmds:
      - go test ./... -short -v

  test-cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -cover -coverprofile=coverage.out -v

  test-integration-mysql:
    desc: Run MySQL integration tests
    cmds:
      - go test ./integration_tests/mysql/... -v

  test-integration-postgres:
    desc: Run PostgreSQL integration tests
    cmds:
      - go test ./integration_tests/postgres/... -v

  test-integration-sqlite:
    desc: Run SQLite integration tests
    cmds:
      - go test ./integration_tests/sqlite/... -v

  test-integration-oracle:
    desc: Run Oracle integration tests
    cmds:
      - go test ./integration_tests/oracle/... -v

  build:
    desc: Build the project
    cmds:
      - go build ./...

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  nilaway:
    desc: Run nilaway static analysis
    cmds:
      - nilaway ./...

  errcheck:
    desc: Run errcheck static analysis
    cmds:
      - errcheck ./...
